<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 7 - Unsplash Image Search</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .search-container {
          margin: 20px 0;
          display: flex;
          gap: 10px;
        }
        input[type="text"] {
          padding: 10px;
          font-size: 16px;
          flex: 1;
          border: 1px solid #ccc;
          border-radius: 4px;
        }
        select, button {
          padding: 10px 15px;
          font-size: 16px;
          cursor: pointer;
          border: 1px solid #ccc;
          border-radius: 4px;
          background-color: #f4f4f4;
        }
        button:hover {
          background-color: #ddd;
        }
        #image-grid {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
          gap: 20px;
          margin-top: 20px;
        }
        .image-card {
          border: 1px solid #ddd;
          border-radius: 8px;
          overflow: hidden;
          box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
          transition: transform 0.2s ease;
        }
        .image-card:hover {
          transform: scale(1.03);
        }
        .image-card img {
          width: 100%;
          height: 200px;
          object-fit: cover;
          display: block;
        }
        .image-info {
          padding: 10px;
          background: #fff;
        }
        .image-info p {
          margin: 0;
          font-size: 14px;
          color: #333;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }
    </style>
</head>
<body>
<header>
    <nav>
        <ul>
            <li><a href="../index.html">Home</a></li>
            <li><a href="../labs.html">Labs</a></li>
            <li><a href="../contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<main>
    <section>
        <h2>Unsplash API Image Search</h2>
        <p>Search for images using the input below. Select the fetch methodology to execute the request.</p>

        <div class="search-container">
            <input type="text" id="search-query" placeholder="Enter keywords (e.g., architecture, nature)...">

            <select id="fetch-method">
                <option value="xhr">XHR (XMLHttpRequest)</option>
                <option value="fetch-promise">Fetch with Promises</option>
                <option value="async-await">Fetch with Async/Await</option>
            </select>

            <button id="search-btn">Search</button>
        </div>

        <div id="image-grid"></div>
    </section>
</main>

<footer>
    <p>&copy; 2026 RAMI JAMEEL ALIELI - CPIT 405 Portfolio</p>
</footer>

<script src="script.js"></script>
</body>
</html>
